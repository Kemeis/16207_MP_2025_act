<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>16207_MP_2025</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    #buttons {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      width: 250px;
      background-color: rgba(255,255,255,0.7);
      border-radius: 8px;
      padding: 10px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .nav-button {
      padding: 10px 16px;
      margin: 5px 0;
      font-size: 14px;
      background-color: #ffffffcc;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 48%;
    }

    .nav-button:hover {
      background-color: #ddd;
    }

    #panorama {
      width: 100%;
      height: 100%;
      position: absolute;
    }
  </style>
</head>
<body>

  <div id="buttons">
    <div class="button-row">
      <button class="nav-button" onclick="viewer.setPanorama(panoNew)">16/03/26</button>
      <button class="nav-button" onclick="viewer.setPanorama(panoOld)">14/03/26</button>
    </div>
  </div>

  <div id="panorama"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.105.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/pchen66/panolens.js@0.10.2/build/panolens.min.js"></script>

  <script>
    // panoramy
    const panoOld = new PANOLENS.ImagePanorama('temp.jpeg'); // 14/03/26
    const panoNew = new PANOLENS.ImagePanorama('cc.jpeg');   // 16/03/26

    const viewer = new PANOLENS.Viewer({
      container: document.querySelector('#panorama'),
      autoRotate: false
    });

    viewer.add(panoOld);
    viewer.add(panoNew);

    // startowa panorama
    viewer.setPanorama(panoOld);
  </script>

</body>
</html>
