<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>16207_MP_2025</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
    }

    #buttons {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      width: 250px;
      background-color: rgba(255,255,255,0.7);
      border-radius: 8px;
      padding: 10px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .nav-button {
      padding: 10px 16px;
      margin: 5px 0;
      font-size: 14px;
      background-color: #ffffffcc;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 48%;
    }

    .nav-button:hover {
      background-color: #ddd;
    }

    #panorama {
      width: 100%;
      height: 100%;
      position: absolute;
    }
  </style>
</head>
<body>

  <div id="buttons">
    <div class="button-row">
      <button class="nav-button" onclick="viewer.setPanorama(panoOld)">14/03/26</button>
      <button class="nav-button" onclick="viewer.setPanorama(panoNew)">16/03/26</button>
    </div>
  </div>

  <div id="panorama"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.105.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/pchen66/panolens.js@0.10.2/build/panolens.min.js"></script>

  <script>
    const panoOld = new PANOLENS.ImagePanorama('test.jpeg');
    const panoNew = new PANOLENS.ImagePanorama('cc.jpeg');

    const viewer = new PANOLENS.Viewer({
      container: document.querySelector('#panorama'),
      autoRotate: false
    });

    // hotspot: test.jpeg -> cc.jpeg
    const spotToNew = new PANOLENS.Infospot(350, PANOLENS.DataImage.Info);
    spotToNew.position.set(-700, -350, -4800);
    spotToNew.addHoverText('Go to');
    spotToNew.addEventListener('click', () => {
      viewer.setPanorama(panoNew);
    });
    panoOld.add(spotToNew);

    // hotspot: cc.jpeg -> test.jpeg
    const spotToOld = new PANOLENS.Infospot(350, PANOLENS.DataImage.Info);
    spotToOld.position.set(900, -350, -4800);
    spotToOld.addHoverText('Go to');
    spotToOld.addEventListener('click', () => {
      viewer.setPanorama(panoOld);
    });
    panoNew.add(spotToOld);

    viewer.add(panoOld);
    viewer.add(panoNew);

    const params = new URLSearchParams(window.location.search);
    const selectedPano = params.get('pano');

    if (selectedPano === 'new') {
      viewer.setPanorama(panoNew);
    } else {
      viewer.setPanorama(panoOld);
    }
  </script>

</body>
</html>
